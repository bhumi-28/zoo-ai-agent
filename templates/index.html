<!DOCTYPE html>
<html>
<head>
  <title>Zoo AI Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 14px;
      animation: fadeIn 0.3s ease-in;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
    }

    #inputBox {
      display: flex;
      padding: 12px;
      background: #020617;
      border-top: 1px solid #1e293b;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>🐼 Zoo AI Chatbot</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

<script>
  function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function send() {
    const input = document.getElementById("msg");
    const message = input.value;

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
      addMessage(data.reply, "bot");
    });
  }
</script>

</body>
</html>
